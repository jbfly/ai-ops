version: '3.8'
services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    container_name: llama-brain
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8080:8080"
    volumes:
      - /home/jbfly/ai/models:/models
    command: >
      -m /models/gpt-oss-20b-mxfp4.gguf
      --port 8080 --host 0.0.0.0
      -ngl 99 --flash-attn on
      -c 16384 -ctk q4_0 -ctv q4_0
      --jinja
      --alias "gpt-oss-20b"
    restart: always
