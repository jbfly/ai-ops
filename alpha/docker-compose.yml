services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    container_name: llama-brain
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8080:8080"
    volumes:
      - /home/jbfly/ai/models:/models
    command: >
      -m /models/gpt-oss-20b-mxfp4.gguf
      --port 8080 --host 0.0.0.0 
      -ngl 99 --flash-attn on
      -c 24576 -ctk q4_0 -ctv q4_0 
      --reasoning-format auto
      --jinja
      --chat-template harmony
      --alias "gpt-oss-20b"
    restart: always

  proxy:
    image: python:3.13
    container_name: codex-proxy
    ports:
      - "2455:2455"
    environment:
      - CODEX_LB_UPSTREAM_BASE_URL=http://llama-server:8080/v1
      - CODEX_LB_MODE=local-proxy
      - CODEX_STRICT_TOOLS=true
    command: >
      sh -c "pip install uv &&
             uv pip install --system git+https://github.com/Soju06/codex-lb.git &&
             codex-lb --host 0.0.0.0 --port 2455"
    depends_on:
      - llama-server
    restart: always
